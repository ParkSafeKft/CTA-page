<style>
:root {
  --green: #34aa56;
  --green-dark: #2b8f48;
  --green-deep: #14532d;
  --green-50: #f0fdf4;
  --green-100: #dcfce7;
  --green-200: #bbf7d0;
  --ink: #0a1f12;
  --ink-soft: #2a3a2f;
  --paper: #f7f5f0;
  --paper-2: #efece4;
  --cream: #fffef9;
  --orange: #f59e0b;
  --orange-soft: #fde68a;
  --blue: #3b82f6;
  --blue-soft: #dbeafe;
  --pink: #ec4899;
  --pink-soft: #fce7f3;
  --danger: #EF4444;
  --shadow: 4px 4px 0 0 var(--ink);
  --shadow-lg: 8px 8px 0 0 var(--ink);
  --shadow-sm: 2px 2px 0 0 var(--ink);
  --border: 2.5px solid var(--ink);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Inter', sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
.hx { font-family: 'Archivo Black', sans-serif; letter-spacing: -0.025em; line-height: 0.92; }
.serif { font-family: 'Archivo', serif; font-weight: 800; letter-spacing: -0.02em; }
.mono { font-family: 'JetBrains Mono', monospace; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
a { color: inherit; text-decoration: none; }
img { display: block; max-width: 100%; }

/* card primitives */
.card { border: var(--border); background: var(--cream); box-shadow: var(--shadow); border-radius: 4px; }
.card-lg { border: 3px solid var(--ink); background: var(--cream); box-shadow: var(--shadow-lg); border-radius: 6px; }
.pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 7px 14px; border: 2px solid var(--ink); background: #fff;
  font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700;
  text-transform: uppercase; border-radius: 999px; letter-spacing: 0.02em;
}
.btn {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 14px 24px; border: 2.5px solid var(--ink); background: var(--green); color: #fff;
  font-family: 'Inter', sans-serif; font-weight: 700; font-size: 15px;
  box-shadow: var(--shadow); border-radius: 999px;
  transition: transform .12s ease, box-shadow .12s ease;
}
.btn:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 0 var(--ink); }
.btn:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 0 var(--ink); }
.btn.ghost { background: #fff; color: var(--ink); }
.btn.ink { background: var(--ink); color: #fff; }
.btn.big { padding: 18px 30px; font-size: 16px; }

/* decorative */
.dot-bg {
  background-image: radial-gradient(circle at 1px 1px, rgba(10,31,18,0.12) 1px, transparent 0);
  background-size: 22px 22px;
}
.grid-bg {
  background-image:
    linear-gradient(rgba(10,31,18,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(10,31,18,0.06) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* animations */
@keyframes slide { from { transform: translateX(0); } to { transform: translateX(-50%); } }
.marquee { overflow: hidden; display: flex; }
.marquee-track { display: flex; gap: 56px; padding-right: 56px; animation: slide 38s linear infinite; white-space: nowrap; }
@keyframes blink { 0%,60% { opacity: 1; } 61%,100% { opacity: 0; } }
.blink { animation: blink 1.2s steps(1) infinite; }
@keyframes wobble { 0%,100% { transform: rotate(-2deg); } 50% { transform: rotate(3deg); } }
.wobble { animation: wobble 5s ease-in-out infinite; }
@keyframes pulsering { 0% { transform: scale(0.8); opacity: 0.7; } 100% { transform: scale(2.4); opacity: 0; } }
.pulse-ring { animation: pulsering 2.2s ease-out infinite; }
@keyframes floaty { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
.floaty { animation: floaty 4s ease-in-out infinite; }

/* sticker badges */
.sticker {
  display: inline-block; padding: 6px 12px; border: 2.5px solid var(--ink);
  font-family: 'Archivo Black', sans-serif; text-transform: uppercase;
  font-size: 13px; letter-spacing: 0.03em; border-radius: 6px;
  box-shadow: var(--shadow-sm);
}

/* chip */
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 10px; border-radius: 999px; font-size: 12px; font-weight: 600;
  border: 2px solid var(--ink);
}
</style>
